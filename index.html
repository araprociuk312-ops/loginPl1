<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión Moderno</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="theme-toggle-container">
        <button id="theme-toggle" class="theme-btn" aria-label="Cambiar tema">
            <span id="theme-icon">🌙</span>
        </button>
    </div>

    <main class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>Bienvenido</h2>
                <p>Ingresa tus credenciales para acceder</p>
            </div>

            <div id="message-container" class="message-box hidden"></div>

            <form id="login-form" novalidate>
                <div class="input-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@demo.com" autocomplete="email">
                    <small class="error-text" id="email-error"></small>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
                        <button type="button" id="toggle-password" class="toggle-password-btn" aria-label="Mostrar contraseña">👁️</button>
                    </div>
                    <small class="error-text" id="password-error"></small>
                </div>

                <button type="submit" id="submit-btn" class="btn-primary">Iniciar sesión</button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
